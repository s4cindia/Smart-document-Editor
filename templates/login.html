<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Smart Document Editor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --font-ui:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      --accent:#2563eb; --accent-hover:#1d4ed8; --accent-soft:#eff6ff; --teal:#0d9488;
      --bg:#f4f6fb; --bg-elev:#ffffff;
      --border:#e4e8f0; --text:#1f2430; --text-soft:#5a6477; --text-faint:#8a93a6;
      --danger:#dc2626;
      --radius:14px; --radius-sm:10px;
      --shadow:0 4px 16px rgba(16,24,40,.08);
      --shadow-lg:0 24px 60px rgba(16,24,40,.18);
      --transition:160ms cubic-bezier(.4,0,.2,1);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{
      font-family:var(--font-ui); color:var(--text);
      background:
        radial-gradient(1100px 500px at 100% -10%, rgba(37,99,235,.12), transparent 60%),
        radial-gradient(900px 500px at -10% 110%, rgba(13,148,136,.10), transparent 55%),
        var(--bg);
      -webkit-font-smoothing:antialiased;
      min-height:100%; display:flex; align-items:center; justify-content:center;
      padding:28px;
    }
    svg{display:block;}

    .auth-card{
      width:100%; max-width:420px;
      background:var(--bg-elev); border:1px solid var(--border);
      border-radius:var(--radius); box-shadow:var(--shadow-lg);
      padding:34px 32px 30px;
    }

    .brand{display:flex; align-items:center; gap:11px; margin-bottom:22px;}
    .brand .logo{
      width:42px; height:42px; border-radius:11px; display:grid; place-items:center;
      color:#fff; background:linear-gradient(135deg,var(--accent),var(--teal));
      box-shadow:var(--shadow);
    }
    .brand .name{font-weight:800; font-size:16px; letter-spacing:-.01em; line-height:1.1;}
    .brand .name small{display:block; font-weight:500; font-size:11.5px; color:var(--text-faint);}

    h1{font-size:22px; font-weight:800; letter-spacing:-.02em; margin-bottom:4px;}
    .sub{font-size:13.5px; color:var(--text-soft); margin-bottom:20px;}

    /* tabs */
    .tabs{
      display:flex; gap:4px; background:#f1f4f9; border:1px solid var(--border);
      border-radius:10px; padding:4px; margin-bottom:22px;
    }
    .tabs a{
      flex:1; text-align:center; text-decoration:none; font-size:13.5px; font-weight:600;
      color:var(--text-soft); padding:9px 0; border-radius:7px; transition:var(--transition);
    }
    .tabs a.active{background:var(--bg-elev); color:var(--accent); box-shadow:var(--shadow);}

    /* error banner */
    .error{
      display:flex; align-items:flex-start; gap:9px;
      background:#fef2f2; border:1px solid #fecaca; color:#b91c1c;
      border-radius:var(--radius-sm); padding:11px 13px; font-size:13px;
      margin-bottom:18px; line-height:1.45;
    }
    .error svg{flex-shrink:0; margin-top:1px;}

    .field{margin-bottom:16px;}
    .field label{display:block; font-size:12.5px; font-weight:600; color:var(--text-soft); margin-bottom:7px;}
    .input-wrap{position:relative;}
    .input-wrap .lead{
      position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-faint);
    }
    .field input{
      width:100%; font-family:var(--font-ui); font-size:14px; color:var(--text);
      background:#fbfcfe; border:1px solid var(--border); border-radius:var(--radius-sm);
      padding:12px 12px 12px 40px; outline:none; transition:var(--transition);
    }
    .field input:focus{
      border-color:var(--accent); background:#fff;
      box-shadow:0 0 0 3px rgba(37,99,235,.14);
    }
    .field .hint{font-size:11.5px; color:var(--text-faint); margin-top:6px;}

    .submit{
      width:100%; font-family:var(--font-ui); font-size:15px; font-weight:700; color:#fff;
      background:linear-gradient(135deg,var(--accent),var(--accent-hover));
      border:none; border-radius:var(--radius-sm); padding:13px; cursor:pointer;
      box-shadow:0 8px 22px rgba(37,99,235,.30); transition:var(--transition); margin-top:4px;
    }
    .submit:hover{transform:translateY(-1px); box-shadow:0 12px 28px rgba(37,99,235,.40);}
    .submit:active{transform:translateY(0);}

    .foot{text-align:center; font-size:13px; color:var(--text-soft); margin-top:18px;}
    .foot a{color:var(--accent); font-weight:600; text-decoration:none;}
    .foot a:hover{text-decoration:underline;}

    .note{
      text-align:center; font-size:11.5px; color:var(--text-faint); margin-top:20px;
      line-height:1.5;
    }
  </style>
</head>
<body>
  <main class="auth-card">
    <div class="brand">
      <div class="logo" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 3v4a1 1 0 0 0 1 1h4"/>
          <path d="M5 21V5a2 2 0 0 1 2-2h7l5 5v6"/>
          <path d="M14.5 18.5 18 15l3 3-3.5 3.5H14.5z"/>
        </svg>
      </div>
      <div class="name">Smart Document Editor<small>Local workspace</small></div>
    </div>

    <h1>Welcome back</h1>
    <p class="sub">Log in to continue to your workspace.</p>

    {% if error %}
      <div class="error">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/>
        </svg>
        <span>{{ error }}</span>
      </div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.login') }}" autocomplete="off">
      <div class="field">
        <label for="username">Username</label>
        <div class="input-wrap">
          <span class="lead" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/>
            </svg>
          </span>
          <input type="text" id="username" name="username" placeholder="your username"
                 value="{{ username or '' }}" required autofocus>
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="lead" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="4" y="11" width="16" height="9" rx="2"/>
              <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
            </svg>
          </span>
          <input type="password" id="password" name="password"
                 placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="submit">Log in</button>
    </form>

    <p class="note">
      Access is restricted. Accounts are created by an administrator —
      contact them if you need access. No data leaves this machine.
    </p>
  </main>
</body>
</html>
