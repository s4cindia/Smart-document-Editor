<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Smart Document Editor &amp; Validator{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 (utilities) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <!-- AG Grid Community -->
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/ag-grid/ag-grid.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/ag-grid/ag-theme-quartz.css') }}">

  <!-- Toastify CSS (SweetAlert2 styles are bundled in its .all.min.js) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/toastify/toastify.css') }}?v={{ asset_version }}">

  <!-- App styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ asset_version }}">

  <script>
    // Apply saved theme before paint to avoid flash.
    (function () {
      var t = localStorage.getItem("sde-theme") || "light";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
</head>
<body>
  {% if not hide_global_nav %}{% include "partials/topbar.html" %}{% endif %}
  {% block body %}{% endblock %}

  <!-- Libraries -->
  <script src="{{ url_for('static', filename='vendor/ag-grid/ag-grid-community.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/sweetalert2/sweetalert2.all.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/toastify/toastify.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/chartjs/chart.umd.js') }}"></script>

  <!-- App scripts -->
  <script>window.SDE_BUILD = "{{ asset_version }}";</script>
  <script src="{{ url_for('static', filename='js/saveas.js') }}?v={{ asset_version }}"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}?v={{ asset_version }}"></script>
  <script src="{{ url_for('static', filename='js/help.js') }}?v={{ asset_version }}"></script>
  <script src="{{ url_for('static', filename='js/grid.js') }}?v={{ asset_version }}"></script>
  <script src="{{ url_for('static', filename='js/validation.js') }}?v={{ asset_version }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
