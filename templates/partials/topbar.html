{# Global application header. Self-contained (inline SVG + inline CSS) so it
   renders identically on every page, including networks that block CDNs. #}
{% if current_user %}
<style>
  .gnav{position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:6px;
    height:48px;padding:0 16px;background:#0f172a;color:#e2e8f0;flex:none;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;box-shadow:0 2px 10px -4px rgba(2,6,23,.6);}
  .gnav a{color:#cbd5e1;text-decoration:none;}
  .gnav .gnav-brand{display:flex;align-items:center;gap:9px;font-weight:800;color:#fff;
    font-size:14.5px;letter-spacing:-.01em;margin-right:10px;white-space:nowrap;}
  .gnav .gnav-brand .gnav-logo{width:26px;height:26px;border-radius:7px;background:#4f46e5;
    display:grid;place-items:center;color:#fff;flex:none;}
  .gnav .gnav-link{display:inline-flex;align-items:center;gap:7px;height:32px;padding:0 12px;
    border-radius:8px;font-size:13px;font-weight:600;white-space:nowrap;transition:background .15s,color .15s;}
  .gnav .gnav-link:hover{background:#1e293b;color:#fff;}
  .gnav .gnav-link.active{background:#4f46e5;color:#fff;}
  .gnav .gnav-spacer{margin-left:auto;}
  .gnav .gnav-user{display:inline-flex;align-items:center;gap:8px;padding:0 6px 0 12px;
    font-size:12.5px;color:#94a3b8;white-space:nowrap;}
  .gnav .gnav-user b{color:#e2e8f0;font-weight:700;}
  .gnav .gnav-role{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;
    padding:2px 7px;border-radius:999px;background:#334155;color:#cbd5e1;}
  .gnav .gnav-role.admin{background:#4f46e5;color:#fff;}
  .gnav .gnav-ver{font-size:10px;color:#64748b;font-family:ui-monospace,monospace;}
  .gnav .gnav-logout{background:#1e293b;}
  .gnav svg{width:15px;height:15px;flex:none;}
</style>
<header class="gnav" role="navigation" aria-label="Main navigation">
  <a class="gnav-brand" href="{{ url_for('main.dashboard') }}">
    <span class="gnav-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
    </span>
    <span>ACCESSIBILITY TOOLS</span>
  </a>

  <a class="gnav-link{% if request.path == '/' %} active{% endif %}" href="{{ url_for('main.dashboard') }}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
    Dashboard
  </a>

  <a class="gnav-link gnav-logout" href="{{ url_for('auth.logout') }}" title="Log out">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>
    Logout
  </a>
</header>
{% endif %}
