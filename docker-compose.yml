services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sde}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-smart_document_editor}
    volumes:
      - sde-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sde} -d ${POSTGRES_DB:-smart_document_editor}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Not published to the host — only the app container can reach it.

  app:
    build: .
    image: smart-document-editor
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Internal/LAN: reachable on the server's network at http://<server-ip>:5000
      # Lock it to localhost (127.0.0.1:5000:5000) if a proxy/VPN fronts it later.
      - "5000:5000"
    environment:
      # Session signing key — REQUIRED. Generate: openssl rand -hex 32
      SDE_SECRET_KEY: ${SDE_SECRET_KEY:?set SDE_SECRET_KEY in .env}
      # Point the app at Postgres. SDE_DB_URL takes priority over the backend
      # selector and is passed straight to SQLAlchemy create_engine().
      SDE_DB_URL: "postgresql+psycopg2://${POSTGRES_USER:-sde}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-smart_document_editor}"
      SDE_DATA_DIR: "/data"
    volumes:
      - sde-data:/data           # recent-files state, scratch data
      - sde-uploads:/app/uploads
      - sde-exports:/app/exports
      - sde-reports:/app/reports
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/login').status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  sde-pgdata:
  sde-data:
  sde-uploads:
  sde-exports:
  sde-reports:
